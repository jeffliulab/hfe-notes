site_name: 人因工程课程笔记
site_author: Jeff Liu
site_url: https://jeffliulab.github.io/hfe-notes/

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.top
    - navigation.path
    - search.suggest
    - search.highlight

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: zh
          default: true
          name: 中文
          build: true
        - locale: en
          name: English
          build: true
          site_name: HFE Course Notes
          nav_translations:
            首页: "Home"
            ENP111 Use-related Risks: "ENP111 Use-related Risks"
            ENP111 Use-related Risks 总览: "ENP111 Use-related Risks Overview"
            ENP112 Engineering Forensics: "ENP112 Engineering Forensics"
            ENP112 Engineering Forensics 总览: "ENP112 Engineering Forensics Overview"
            课程导论: "Course Overview"
            人因导论: "Introduction to Human Factors"
            人为失误框架: "Human Error Frameworks"
            Swiss Cheese 模型: "Swiss Cheese Model"
            错误分析方法: "Error Analysis Methods"
            任务分析: "Task Analysis"
            URRA方法: "URRA Methods"
            Known Problem 与事件树: "Known Problems and Event Trees"
            ISO 14971: "ISO 14971"
            医疗器械URRA: "Medical Device URRA"
            医疗器械使用错误: "Medical Device Use Errors"
            EpiPen工作簿: "EpiPen Workbook"
            航空与自动化导论: "Aviation and Automation Intro"
            CRM: "CRM"
            显示与告警: "Displays and Alerts"
            检查单与程序: "Checklists and Procedures"
            自动化车辆: "Automated Vehicles"
            注意与监控: "Attention and Monitoring"
            疲劳与睡眠: "Fatigue and Sleep"
            压力与决策: "Stress and Decision Making"
            情境意识: "Situation Awareness"
            空间定向错觉: "Spatial Disorientation"
            Operational Risk: "Operational Risk"
            Cardosi案例: "Cardosi Case"
            F16分析提示: "F16 Analysis Prompts"
            Boeing 737 Max与伦理: "Boeing 737 Max and Ethics"

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - mdx_truly_sane_lists:
      nested_indent: 2

extra_javascript:
  - site_extra_styles/javascripts/katex.js
  - site_extra_styles/javascripts/tab_dropdown.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js

extra_css:
  - https://unpkg.com/katex@0/dist/katex.min.css
  - site_extra_styles/stylesheets/extra.css
  - site_extra_styles/stylesheets/correct_bullet_point.css

nav:
  - 首页: index.md
  - ENP111 Use-related Risks:
    - ENP111 Use-related Risks 总览: ENP111/index.md
    - 人因导论: ENP111/human_factors_intro.md
    - 人为失误框架: ENP111/human_error_frameworks.md
    - Swiss Cheese 模型: ENP111/swiss_cheese.md
    - 任务分析: ENP111/task_analysis.md
    - URRA方法: ENP111/urra_methods.md
    - Known Problem 与事件树: ENP111/known_problem_and_event_tree.md
    - ISO 14971: ENP111/iso_14971.md
    - 医疗器械URRA: ENP111/medical_device_urra.md
    - 医疗器械使用错误: ENP111/medical_device_use_errors.md
    - EpiPen工作簿: ENP111/epipen_workbook.md
  - ENP112 Engineering Forensics:
    - ENP112 Engineering Forensics 总览: ENP112/index.md
    - 课程导论: ENP112/course_overview.md
    - 错误分析方法: ENP112/error_analysis_methods.md
    - 航空与自动化导论: ENP112/aviation_automation_intro.md
    - CRM: ENP112/crew_resource_management.md
    - 显示与告警: ENP112/displays_and_alerts.md
    - 检查单与程序: ENP112/checklists_and_procedures.md
    - 自动化车辆: ENP112/automated_vehicles.md
    - 注意与监控: ENP112/attention_and_monitoring.md
    - 疲劳与睡眠: ENP112/fatigue_and_sleep.md
    - 压力与决策: ENP112/stress_and_decision_making.md
    - 情境意识: ENP112/situation_awareness.md
    - 空间定向错觉: ENP112/spatial_disorientation.md
    - Operational Risk: ENP112/operational_risk.md
    - Cardosi案例: ENP112/cardosi_case.md
    - F16分析提示: ENP112/f16_analysis_prompts.md
    - Boeing 737 Max与伦理: ENP112/boeing_737max_and_ethics.md
