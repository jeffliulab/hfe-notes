site_name: 人因工程课程笔记
site_author: Jeff Liu
site_url: https://jeffliulab.github.io/hfe-notes/

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.top
    - navigation.path
    - search.suggest
    - search.highlight

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: zh
          default: true
          name: 中文
          build: true
        - locale: en
          name: English
          build: true
          site_name: HFE Course Notes
          nav_translations:
            首页: "Home"
            HFE基础: "HFE Foundations"
            HFE基础总览: "HFE Foundations Overview"
            风险方法: "Risk Methods"
            风险方法总览: "Risk Methods Overview"
            医疗器械: "Medical Devices"
            医疗器械总览: "Medical Devices Overview"
            航空与自动化: "Aviation & Automation"
            航空与自动化总览: "Aviation & Automation Overview"
            人的表现: "Human Performance"
            人的表现总览: "Human Performance Overview"
            案例与伦理: "Cases & Ethics"
            案例与伦理总览: "Cases & Ethics Overview"
            课程导论: "Course Overview"
            人因导论: "Introduction to Human Factors"
            人为失误框架: "Human Error Frameworks"
            Swiss Cheese 模型: "Swiss Cheese Model"
            错误分析方法: "Error Analysis Methods"
            任务分析: "Task Analysis"
            URRA方法: "URRA Methods"
            Known Problem 与事件树: "Known Problems and Event Trees"
            ISO 14971: "ISO 14971"
            医疗器械URRA: "Medical Device URRA"
            医疗器械使用错误: "Medical Device Use Errors"
            EpiPen工作簿: "EpiPen Workbook"
            航空与自动化导论: "Aviation and Automation Intro"
            CRM: "CRM"
            显示与告警: "Displays and Alerts"
            检查单与程序: "Checklists and Procedures"
            自动化车辆: "Automated Vehicles"
            注意与监控: "Attention and Monitoring"
            疲劳与睡眠: "Fatigue and Sleep"
            压力与决策: "Stress and Decision Making"
            情境意识: "Situation Awareness"
            空间定向错觉: "Spatial Disorientation"
            Operational Risk: "Operational Risk"
            Cardosi案例: "Cardosi Case"
            F16分析提示: "F16 Analysis Prompts"
            Boeing 737 Max与伦理: "Boeing 737 Max and Ethics"

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - mdx_truly_sane_lists:
      nested_indent: 2

extra_javascript:
  - site_extra_styles/javascripts/katex.js
  - site_extra_styles/javascripts/tab_dropdown.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js

extra_css:
  - https://unpkg.com/katex@0/dist/katex.min.css
  - site_extra_styles/stylesheets/extra.css
  - site_extra_styles/stylesheets/correct_bullet_point.css

nav:
  - 首页: index.md
  - HFE基础:
    - HFE基础总览: HFE_Foundations/index.md
    - 课程导论: HFE_Foundations/course_overview.md
    - 人因导论: HFE_Foundations/human_factors_intro.md
    - 人为失误框架: HFE_Foundations/human_error_frameworks.md
    - Swiss Cheese 模型: HFE_Foundations/swiss_cheese.md
  - 风险方法:
    - 风险方法总览: HFE_Risk_Methods/index.md
    - 错误分析方法: HFE_Risk_Methods/error_analysis_methods.md
    - 任务分析: HFE_Risk_Methods/task_analysis.md
    - URRA方法: HFE_Risk_Methods/urra_methods.md
    - Known Problem 与事件树: HFE_Risk_Methods/known_problem_and_event_tree.md
  - 医疗器械:
    - 医疗器械总览: HFE_Medical_Devices/index.md
    - ISO 14971: HFE_Medical_Devices/iso_14971.md
    - 医疗器械URRA: HFE_Medical_Devices/medical_device_urra.md
    - 医疗器械使用错误: HFE_Medical_Devices/medical_device_use_errors.md
    - EpiPen工作簿: HFE_Medical_Devices/epipen_workbook.md
  - 航空与自动化:
    - 航空与自动化总览: HFE_Aviation_Automation/index.md
    - 航空与自动化导论: HFE_Aviation_Automation/aviation_automation_intro.md
    - CRM: HFE_Aviation_Automation/crew_resource_management.md
    - 显示与告警: HFE_Aviation_Automation/displays_and_alerts.md
    - 检查单与程序: HFE_Aviation_Automation/checklists_and_procedures.md
    - 自动化车辆: HFE_Aviation_Automation/automated_vehicles.md
  - 人的表现:
    - 人的表现总览: HFE_Human_Performance/index.md
    - 注意与监控: HFE_Human_Performance/attention_and_monitoring.md
    - 疲劳与睡眠: HFE_Human_Performance/fatigue_and_sleep.md
    - 压力与决策: HFE_Human_Performance/stress_and_decision_making.md
    - 情境意识: HFE_Human_Performance/situation_awareness.md
    - 空间定向错觉: HFE_Human_Performance/spatial_disorientation.md
  - 案例与伦理:
    - 案例与伦理总览: HFE_Cases_Ethics/index.md
    - Operational Risk: HFE_Cases_Ethics/operational_risk.md
    - Cardosi案例: HFE_Cases_Ethics/cardosi_case.md
    - F16分析提示: HFE_Cases_Ethics/f16_analysis_prompts.md
    - Boeing 737 Max与伦理: HFE_Cases_Ethics/boeing_737max_and_ethics.md
